<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <style>
      .ink { fill: #16241f; }
      .stroke { fill: none; stroke: #16241f; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .wordmark { font-family: 'Montserrat', sans-serif; font-weight: 800; fill: #16241f; }
      .tagline { font-family: 'Source Sans 3', sans-serif; font-weight: 600; fill: #5b6663; letter-spacing: 3px; }
    </style>
  </defs>

  <!-- Gear badge, 130x130 centered horizontally -->
  <g transform="translate(85,8) scale(1.083)">
    <path class="ink" d="M 49.65,21.36 L 52.99,12.51 L 67.01,12.51 L 70.35,21.36 L 77.67,15.37 L 89.82,22.38 L 88.28,31.72 L 97.62,30.18 L 104.63,42.33 L 98.64,49.65 L 107.49,52.99 L 107.49,67.01 L 98.64,70.35 L 104.63,77.67 L 97.62,89.82 L 88.28,88.28 L 89.82,97.62 L 77.67,104.63 L 70.35,98.64 L 67.01,107.49 L 52.99,107.49 L 49.65,98.64 L 42.33,104.63 L 30.18,97.62 L 31.72,88.28 L 22.38,89.82 L 15.37,77.67 L 21.36,70.35 L 12.51,67.01 L 12.51,52.99 L 21.36,49.65 L 15.37,42.33 L 22.38,30.18 L 31.72,31.72 L 30.18,22.38 L 42.33,15.37 Z"/>
    <circle cx="60" cy="60" r="34" fill="#fbf9f8"/>

    <!-- Tractor icon -->
    <g class="stroke">
      <!-- rear (large) wheel -->
      <circle cx="45" cy="77" r="14"/>
      <circle cx="45" cy="77" r="2.4" fill="#16241f" stroke="none"/>
      <!-- front (small) wheel -->
      <circle cx="76" cy="80" r="7"/>
      <circle cx="76" cy="80" r="1.6" fill="#16241f" stroke="none"/>
      <!-- hood -->
      <rect x="55" y="59" width="25" height="16" rx="2"/>
      <!-- seat back + steering column -->
      <path d="M38,64 L38,45 L53,58"/>
      <circle cx="46" cy="49" r="5"/>
      <path d="M46,54 L46,59"/>
      <!-- exhaust pipe + zigzag smoke -->
      <path d="M76,59 L76,38 L82,38 L82,32 L88,32 L88,27"/>
      <!-- plowed field lines -->
      <path d="M32,92 L44,86 M46,93 L58,86 M60,93 L72,86"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="150" y="232" text-anchor="middle" class="wordmark" font-size="50">Agr<tspan>O</tspan>suna</text>
  <text x="150" y="264" text-anchor="middle" class="tagline" font-size="12">SERVICIOS AGROPECUARIOS</text>
</svg>
